plugins {
    id 'java'
}

import java.io.FileOutputStream

group = 'com.wcohen'
version = '2.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories { mavenCentral() }

dependencies {
    implementation 'org.apache.logging.log4j:log4j-api:2.23.1'
    runtimeOnly 'org.apache.logging.log4j:log4j-core:2.23.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.2'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.2'
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}

// ── Benchmark tasks ─────────────────────────────────────────────────────────

sourceSets {
    test {
        java.srcDirs += ['apache-similarity/src/main/java']
    }

    jmh {
        java.srcDirs = ['src/jmh/java', 'apache-similarity/src/main/java']
        compileClasspath += sourceSets.main.output + configurations.runtimeClasspath
    }
}

tasks.register('compileBenchmark', JavaCompile) {
    source = sourceSets.jmh.java
    classpath = sourceSets.jmh.compileClasspath
    destinationDirectory = layout.buildDirectory.dir('classes/java/jmh')
    options.compilerArgs += ['--add-modules', 'jdk.incubator.vector']
}
compileBenchmark.dependsOn compileJava

tasks.register('benchmark', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.LargeDatasetBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def phase = providers.gradleProperty('phase')
    doFirst {
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}

tasks.register('benchmarkDataset', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.LargeDatasetBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def dataset = providers.gradleProperty('dataset')
    def phase = providers.gradleProperty('phase')
    doFirst {
        if (!dataset.present || dataset.get().trim().isEmpty()) {
            throw new GradleException("Missing -Pdataset=<name>. Example: ./gradlew benchmarkDataset -Pdataset=acm_large")
        }
        args(dataset.get().trim())
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}

tasks.register('quickBenchmark', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.QuickBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def phase = providers.gradleProperty('phase')
    doFirst {
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}

def benchmarkOutputDir = layout.projectDirectory.dir('out/benchmarks').asFile

def sanitizeBenchmarkToken = { String value ->
    value.replaceAll('[^A-Za-z0-9._-]+', '_')
}

def attachBenchmarkCapture = { JavaExec task, Closure<String> outputNameSupplier ->
    task.doFirst {
        benchmarkOutputDir.mkdirs()
        File outputFile = new File(benchmarkOutputDir, outputNameSupplier.call())
        FileOutputStream stream = new FileOutputStream(outputFile)
        task.extensions.extraProperties.set('captureStream', stream)
        standardOutput = stream
        errorOutput = stream
        logger.lifecycle("Writing benchmark output to ${outputFile}")
    }
    task.doLast {
        def stream = task.extensions.extraProperties.get('captureStream')
        if (stream != null) {
            stream.close()
        }
    }
}

tasks.register('benchmarkCapture', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.LargeDatasetBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def phase = providers.gradleProperty('phase')
    doFirst {
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}
attachBenchmarkCapture(tasks.named('benchmarkCapture').get(), {
    def phase = providers.gradleProperty('phase')
    phase.present && !phase.get().trim().isEmpty()
        ? "benchmark_${sanitizeBenchmarkToken(phase.get().trim())}.out"
        : 'benchmark_full.out'
})

tasks.register('benchmarkDatasetCapture', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.LargeDatasetBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def dataset = providers.gradleProperty('dataset')
    def phase = providers.gradleProperty('phase')
    doFirst {
        if (!dataset.present || dataset.get().trim().isEmpty()) {
            throw new GradleException("Missing -Pdataset=<name>. Example: ./gradlew benchmarkDatasetCapture -Pdataset=acm_large")
        }
        args(dataset.get().trim())
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}
attachBenchmarkCapture(tasks.named('benchmarkDatasetCapture').get(), {
    def dataset = providers.gradleProperty('dataset')
    def phase = providers.gradleProperty('phase')
    if (!dataset.present || dataset.get().trim().isEmpty()) {
        throw new GradleException("Missing -Pdataset=<name>. Example: ./gradlew benchmarkDatasetCapture -Pdataset=acm_large")
    }
    String datasetPart = sanitizeBenchmarkToken(dataset.get().trim())
    if (phase.present && !phase.get().trim().isEmpty()) {
        return "benchmark_dataset_${datasetPart}_${sanitizeBenchmarkToken(phase.get().trim())}.out"
    }
    return "benchmark_dataset_${datasetPart}.out"
})

tasks.register('quickBenchmarkCapture', JavaExec) {
    dependsOn compileBenchmark
    mainClass = 'com.wcohen.ss.benchmark.QuickBenchmark'
    classpath = files(
        sourceSets.main.output,
        layout.buildDirectory.dir('classes/java/jmh'),
        configurations.runtimeClasspath
    )
    jvmArgs '--add-modules', 'jdk.incubator.vector'

    def phase = providers.gradleProperty('phase')
    doFirst {
        if (phase.present && !phase.get().trim().isEmpty()) {
            systemProperty 'benchmark.phase', phase.get().trim()
        }
    }
}
attachBenchmarkCapture(tasks.named('quickBenchmarkCapture').get(), {
    def phase = providers.gradleProperty('phase')
    phase.present && !phase.get().trim().isEmpty()
        ? "quick_benchmark_${sanitizeBenchmarkToken(phase.get().trim())}.out"
        : 'quick_benchmark.out'
})
